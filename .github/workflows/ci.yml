name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  php-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: PHP syntax and load checks
        run: php scripts/check-php.php
